# =========================================================
# SERVER
# =========================================================
server.contextPath=/service
server.port=8443
server.tomcat.uri-encoding=UTF-8

server.tomcat.threads.max=60
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=50
server.connection-timeout=30000

# =========================================================
# SESSION / SECURITY
# =========================================================
spring.session.store-type=hash-map
security.basic.enabled=false

# =========================================================
# SSL
# =========================================================
server.ssl.key-store=classpath:ieltsroom_com_pfx.pfx
server.ssl.key-store-password=L7QTCfThYG
server.ssl.key-store-type=PKCS12

# =========================================================
# LOGGING
# =========================================================
logging.level.com.globits=INFO
logging.level.org=ERROR
logging.level.net=ERROR
logging.level.javax=ERROR

# =========================================================
# CORS
# =========================================================
endpoints.cors.allow-credentials=false
endpoints.cors.allowed-headers=Authorization,Content-Type
endpoints.cors.allowed-methods=POST,PUT,GET,OPTIONS,DELETE
endpoints.cors.max-age=600
endpoints.cors.allowed-origins=*

# =========================================================
# DATASOURCE - SQL SERVER
# =========================================================
spring.datasource.url=jdbc:sqlserver://LOCALHOST\\SQLEXPRESS;databaseName=ecommerce
spring.datasource.username=sa
spring.datasource.password=Sqlserver!@#.
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# =========================================================
# JPA / HIBERNATE
# =========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=com.globits.core.dialect.UnicodeSQLServerDialect
spring.jpa.properties.hibernate.max_fetch_depth=2
spring.jpa.properties.hibernate.jdbc.fetch_size=30
spring.jpa.properties.hibernate.jdbc.batch_size=10

# =========================================================
# C3P0 POOL
# =========================================================
spring.jpa.properties.hibernate.c3p0.min_size=5
spring.jpa.properties.hibernate.c3p0.max_size=12
spring.jpa.properties.hibernate.c3p0.timeout=120
spring.jpa.properties.hibernate.c3p0.max_statements=30

# =========================================================
# FILE UPLOAD
# =========================================================
spring.http.multipart.max-file-size=10MB
spring.http.multipart.max-request-size=10MB


