<!-- END PAGE HEADER-->
<!-- BEGIN MAIN CONTENT -->
<div class="row margin-top-10">
    <div class="col-md-12">
    
        <div class="portlet light bordered">
            <div class="portlet-body">
                    <div class="row">
                        <div class="col-md-1">
                            <input data-ng-model="vm.startDate" type="text" class="form-control" placeholder="Start date" my-date-picker />
                        </div>

                        <div class="col-md-1">
                            <input data-ng-model="vm.endDate" type="text" class="form-control" placeholder="End date" my-date-picker />
                        </div>
                        <div class="col-md-2 margin-bottom-20">
                            <div class="input-group">
                                <input ng-model="vm.searchDto.grade" ng-keyup="vm.enterSearchCode(e)" type="text"  class="form-control" placeholder="Find by grade...">
                                <div class="input-group-btn">
                                    <button ng-click="vm.codeChange()" class="btn btn-default" type="submit"><i class="glyphicon glyphicon-search"></i></button>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-2 margin-bottom-20">
                            <div class="input-group">
                                <input ng-model="vm.searchDto.textSearch" ng-keyup="vm.enterSearchCode(e)" type="text"  class="form-control" placeholder="Find by test name...">
                                <div class="input-group-btn">
                                    <button ng-click="vm.codeChange()" class="btn btn-default" type="submit"><i class="glyphicon glyphicon-search"></i></button>
                                </div>
                            </div>
                        </div>
                        <!--<div class="col-md-2 margin-bottom-20">-->
                            <!--<div class="input-group">-->
                                <!--<input ng-model="vm.searchDto.userDisplayName" ng-keyup="vm.enterSearchCode(e)" type="text"  class="form-control" placeholder="Find by name (new)...">-->
                                <!--<div class="input-group-btn">-->
                                    <!--<button ng-click="vm.codeChange()" class="btn btn-default" type="submit"><i class="glyphicon glyphicon-search"></i></button>-->
                                <!--</div>-->
                            <!--</div>-->
                        <!--</div>-->
                        <div class="col-md-2 margin-bottom-20">
                            <ui-select ng-change="vm.codeChange()" data-ng-model="vm.searchDto.user" sortable="true" close-on-select="true" style="width: 100% !important;">
                                <ui-select-match allow-clear="true" placeholder="user...">{{$select.selected.displayName}}</ui-select-match>
                                <ui-select-choices repeat="mode in vm.users | propsFilter: {displayName: $select.search}">
                                    <div class="bold" ng-bind-html="mode.displayName | highlight: $select.search">
                                    </div>
                                    <small>{{mode.username}}</small>
                                </ui-select-choices>
                            </ui-select>
                        </div>
                        <div class="col-md-2 margin-bottom-20">
                            <ui-select ng-change="vm.codeChange()" data-ng-model="vm.searchDto.testType" sortable="true" close-on-select="true" style="width: 100% !important;">
                                <ui-select-match allow-clear="true" placeholder="Daily, gaps?">{{$select.selected.name}}</ui-select-match>
                                <ui-select-choices repeat="mode.id as mode in vm.testTypes | propsFilter: {name: $select.search}">
                                    <div class="bold" ng-bind-html="mode.name | highlight: $select.search">
                                    </div>
                                </ui-select-choices>
                            </ui-select>
                        </div>
                    </div>

                    <!--<button class="btn btn-default" data-ng-click="vm.newObject()"><i class="fa fa-plus-circle"></i>Thêm mới</button>-->
                    <!--<button class="btn btn-danger margin-left-10" data-ng-click="vm.deletequestionTypes()" data-ng-disabled="vm.selectedquestionTypes.length <= 0"><i class="fa fa-trash"></i>Xóa</button>-->

                <div class="row">
                    <div class="col-md-5">
                        <div class="row">
                            <div class="col-md-6">
                                <table class="table table-striped ">
                                    <tr class="text-center">
                                        <h1 class="text-center" style="font-family: cursive">RANKINGS <br>TIMES DO TEST</h1>
                                    </tr>
                                    <tr ng-repeat="item in vm.rankings" ng-if="$index < vm.rankings.length/2">
                                        <td style="width: 15%" class="text-center">
                                            <image ng-show="item.rank == 1" ng-src="assets/images/1st.png" style="width: 50%; height: auto;"/>
                                            <image ng-show="item.rank == 2" ng-src="assets/images/2nd.png" style="width: 50%; height: auto;"/>
                                            <image ng-show="item.rank == 3" ng-src="assets/images/3rd.png" style="width: 50%; height: auto;"/>
                                            <span ng-hide="item.rank < 4">Top {{item.rank}}:</span>
                                        </td>
                                        <td>{{item.user.displayName}} - Số lần học: {{item.times}} </td>
                                    </tr>
                                </table>
                            </div>
                            <div class="col-md-6">
                                <table class="table table-striped ">
                                    <tr class="text-center">
                                        <h1 class="text-center" style="font-family: cursive">RANKINGS <br>WORDS LEARNED</h1>
                                    </tr>
                                    <tr ng-repeat="item in vm.rankings" ng-if="$index >= vm.rankings.length/2">
                                        <td style="width: 15%" class="text-center">
                                            <image ng-show="item.rank == 1" ng-src="assets/images/1st.png" style="width: 50%; height: auto;"/>
                                            <image ng-show="item.rank == 2" ng-src="assets/images/2nd.png" style="width: 50%; height: auto;"/>
                                            <image ng-show="item.rank == 3" ng-src="assets/images/3rd.png" style="width: 50%; height: auto;"/>
                                            <span ng-hide="item.rank < 4">Top {{item.rank}}:</span>
                                        </td>
                                        <td>{{item.user.displayName}} - Số từ đã học: {{item.numberOfWords}} </td>
                                    </tr>
                                </table>
                            </div>
                        </div>


                    </div>
                    <div class="col-md-7">
                        <table id="bsTableControl" bs-table-control="vm.bsTableControl"></table>
                    </div>

                </div>

            </div>
        </div>
    </div>
</div>

<!-- END MAIN CONTENT -->

<script type="text/ng-template" id="edit_object_modal.html">
    <div modal-movable>
        <div class="modal-header">
            <button type="button" class="close" ng-click="$dismiss()" aria-hidden="true"></button>
            <h4 class="modal-title" data-ng-if="vm.questionType.isNew == true"><i class="icon-plus"></i>Thêm tôn giáo</h4>
            <h4 class="modal-title" data-ng-if="vm.questionType.isNew == false"><i class="fa fa-pencil-square-o"></i>Cập nhật tôn giáo</h4>
        </div>
        <div class="modal-body">
            <table class="table">
                <thead>
                <tr>
                    <th scope="col">Index</th>
                    <th scope="col">Your answer</th>
                    <th scope="col">Correct answer</th>
                </tr>
                </thead>
                <tbody>
                <tr class="text-center bold" ng-style="(!item.isCorrectTestResultDetail) && {'background':'rgba(196, 77, 86,0.7)'} " ng-repeat="item in vm.testResult.questionAnswerTestResult">

                    <td>{{item.ordinalNumber}}</td>

                    <td ng-if="item.questionAnswer.question.parent.type == 1
                    || item.questionAnswer.question.parent.type == 6
                    || item.questionAnswer.question.parent.type == 5
                    || item.questionAnswer.question.parent.type == 7
                    || item.questionAnswer.question.parent.type == 9
                    || item.questionAnswer.question.parent.type == 10">{{item.questionAnswer.answer.answer}}</td>

                    <td ng-if="item.questionAnswer.question.parent.type == 1 || item.questionAnswer.question.parent.type == 6|| item.questionAnswer.question.parent.type == 9|| item.questionAnswer.question.parent.type == 10">{{item.questionAnswer.correctAnswer}}</td>

                    <td ng-if="item.questionAnswer.question.parent.type == 5 || item.questionAnswer.question.parent.type == 7" ng-bind-html="item.correctAnswerForMultipleAnswer"></td>

                    <td ng-if="item.questionAnswer.question.parent.type == 4 || item.questionAnswer.question.parent.type == 8">{{item.clientAnswer}}</td>
                    <td ng-if="item.questionAnswer.question.parent.type == 4 || item.questionAnswer.question.parent.type == 8">{{item.questionAnswer.correctAnswer}}</td>


                    <!--<td ng-if="item.questionAnswer.question.parent.type == 2 || item.questionAnswer.question.parent.type == 3"-->
                        <!--ng-style="(!item.isCorrectTestResultDetail) && {'background':'rgba(196, 77, 86,1)'}">{{item.ordinalNumber}}</td>-->

                    <td ng-if="item.questionAnswer.question.parent.type == 2 || item.questionAnswer.question.parent.type == 3">
                        {{item.clientAnswer}}
                    </td>
                    <td ng-if="item.questionAnswer.question.parent.type == 2 || item.questionAnswer.question.parent.type == 3">
                        {{item.questionAnswer.answer.answer}}
                    </td>
                </tr>

                </tbody>
            </table>
            <div class="col-md-12" compile="vm.testResult.testTakerPerformance">

            </div>
        </div>
        <div class="modal-footer">
            <!--<button type="button" ng-click="$dismiss()" class="btn btn-default" data-dismiss="modal">Hủy bỏ</button>-->
            <!--<button type="button" ng-click="$close('yes');" class="btn btn-primary" data-dismiss="modal">Lưu</button>-->
        </div>
    </div>
</script>

<script type="text/ng-template" id="confirm_delete_modal.html">
    <div modal-movable>
        <div class="modal-header">
            <button type="button" class="close" ng-click="$dismiss()" aria-hidden="true"></button>
            <h4 class="modal-title"><i class="icon-question"></i>Xóa</h4>
        </div>
        <div class="modal-body">
            <p>Bạn có chắc chắn muốn xóa bản ghi đã chọn không?</p>
        </div>
        <div class="modal-footer">
            <button type="button" ng-click="$dismiss()" class="btn btn-default" data-dismiss="modal">Không</button>
            <button type="button" ng-click="$close('yes')" class="btn btn-primary" data-dismiss="modal">Có</button>
        </div>
    </div>
</script>
