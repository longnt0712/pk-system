<!-- END PAGE HEADER-->
<!-- BEGIN MAIN CONTENT -->
<div class="row margin-top-10">
    <div class="col-md-12">
    
        <div class="portlet light bordered">
            <div class="portlet-body">
                <div class="btn-group pull-left">
                    <!--<button class="btn btn-default" data-ng-click="vm.newObject()"><i class="fa fa-plus-circle"></i>Thêm mới</button>-->
                    <!--<button class="btn btn-danger margin-left-10" data-ng-click="vm.deleteanswers()" data-ng-disabled="vm.selectedanswers.length <= 0"><i class="fa fa-trash"></i>Xóa</button>-->

                </div>
                <div class="row">
                    <div class="col-md-3">
                        <label class="bold">Từ </label>
                        <ui-select ng-change="vm.typeChange()" data-ng-model="vm.from" sortable="true" close-on-select="true" style="width: 100% !important;">
                            <ui-select-match allow-clear="true" placeholder="">{{$select.selected.name}}</ui-select-match>
                            <ui-select-choices repeat="type in vm.types | propsFilter: {name: $select.search}">
                                <div class="bold" ng-bind-html="type.name | highlight: $select.search"></div>
                            </ui-select-choices>
                        </ui-select>
                    </div>
                    <div class="col-md-3">
                        <label class="bold">đến </label>
                        <ui-select ng-change="vm.typeChange()" data-ng-model="vm.to" sortable="true" close-on-select="true" style="width: 100% !important;">
                            <ui-select-match allow-clear="true" placeholder="">{{$select.selected.name}}</ui-select-match>
                            <ui-select-choices repeat="type in vm.types | propsFilter: {name: $select.search}">
                                <div class="bold" ng-bind-html="type.name | highlight: $select.search"></div>
                            </ui-select-choices>
                        </ui-select>
                    </div>
                    <div class="col-md-6">
                        <label class="bold">Số lần ôn </label>
                        <input data-ng-disabled="true" type="number" style="width: 7%;" ng-model="vm.question.timeReviewd" autofocus />
                        <label class="bold">Số lần đúng</label>
                        <input data-ng-disabled="true" type="number" style="width: 7%;" ng-model="vm.question.correctAnswer" autofocus />
                        <label class="bold">Số lần sai </label>
                        <input data-ng-disabled="true" type="number" style="width: 7%;" ng-model="vm.question.wrongAnswer" autofocus />
                        <label class="bold"> lần</label>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12" >
                        <h3 class="bold text-info" ng-bind-html="vm.question.question"></h3>
                    </div>
                    <div class="col-md-12" >
                        <textarea ng-keypress="vm.enterSearchCode()" style="font-size: 30px" rows="8" class="form-control" ng-model="vm.question.answerText" autofocus />
                    </div>
                    <div class="col-md-11" >
                    </div>
                    <div class="col-md-1 text-right margin-top-10">
                        <button class="btn btn-info" ng-click="vm.getRandomObject(vm.from.id,vm.to.id)">Next</button>
                        <button class="btn btn-success" ng-click="vm.clickAnswer()">Answer</button>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12 text-success bold" ng-if="vm.result.result == true">Đúng rồi!!!</div>
                    <div class="col-md-12 text-red bold" ng-if="vm.result.result == false">Sai rồi!!!</div>
                    <div class="col-md-12 text-red bold" ng-if="vm.result.result == false"><span class="text-yellow">(1)Phần sai; </span> <span class="text-success">(2)Đáp án.</span></div>
                    <div class="col-md-12 text-yellow bold" ng-if="vm.result.result == false">{{vm.result.wrongText}}(1)</div>
                    <div class="col-md-12 text-success bold" ng-if="vm.result.result == false">{{vm.result.correctText}}(2)</div>
                    <div class="col-md-12">
                        <p>Ấn Phím "=" để trả lời; Ấn phím "/" để đổi câu</p>
                    </div>
                </div>
                <!--<table id="bsTableControl" bs-table-control="vm.bsTableControl"></table>-->

            </div>
        </div>
    </div>
</div>


<script type="text/ng-template" id="result_modal.html">
    <div modal-movable>
        <div class="modal-header">
            <button type="button" class="close" ng-click="$dismiss()" aria-hidden="true"></button>
            <h4 class="modal-title"><i class="fa fa-check"></i>Đáp án</h4>
        </div>
        <div class="modal-body">

        </div>
        <div class="modal-footer">
            <button type="button" ng-click="$dismiss()" class="btn btn-default" data-dismiss="modal">Không</button>
            <button type="button" ng-click="$close('yes')" class="btn btn-primary" data-dismiss="modal">Có</button>
        </div>
    </div>
</script>
<!-- BEGIN MAIN JS -->
