<script type="text/ng-template" id="edit_object_modal.html">
    <div modal-movable>
        <div class="modal-header">
            <button type="button" class="close" ng-click="$dismiss()" aria-hidden="true"></button>
            <h4 class="modal-title" data-ng-if="vm.item.isNew == true"><i class="icon-plus"></i>Thêm</h4>
            <h4 class="modal-title" data-ng-if="vm.item.isNew == false"><i class="fa fa-pencil-square-o"></i>Cập nhật</h4>
        </div>
        <div class="modal-body">
            <div class="row">
                <div class="col-md-12">
                    <label class="bold">Tên</label>
                    <input data-ng-model="vm.item.name" type="text" autofocus="autofocus" class="form-control" />
                </div>
                <div class="col-md-12">
                    <label class="bold">Mã</label>
                    <input data-ng-model="vm.item.code" type="text" autofocus="autofocus" class="form-control" />
                </div>
                <div class="col-md-12">
                    <label class="bold">Giá nhập</label>
                    <input data-ng-model="vm.item.priceReceipt" type="text" autofocus="autofocus" class="form-control" number-input />
                </div>
                <div class="col-md-12">
                    <label class="bold">Số lượng</label>
                    <input data-ng-model="vm.item.quantity" type="number" autofocus="autofocus" class="form-control" />
                </div>
                <div class="col-md-12">
                    <label class="bold">Ngày nhập</label>
                    <input data-ng-model="vm.item.date" type="text" autofocus="autofocus" class="form-control" my-date-picker />
                </div>
                <div class="col-md-12">
                    <label class="bold">Loại</label>
                    <ui-select ng-model="vm.item.itemType" sortable="true" close-on-select="true">
                        <ui-select-match allow-clear="true" placeholder="Xin mời chọn...">{{$select.selected.name}}</ui-select-match>
                        <ui-select-choices repeat="so.id as so in vm.itemTypes  | propsFilter: {name: $select.search}">
                            <div class="bold" ng-bind-html="so.name | highlight: $select.search"></div>
                        </ui-select-choices>
                    </ui-select>
                </div>
                <!--<div class="col-md-12">-->
                    <!--<label class="bold">Text</label>-->
                    <!--<textarea class="form-control" ng-model="vm.item.name | removeHTMLTags" autofocus />-->
                <!--</div>-->
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" ng-click="$dismiss()" class="btn btn-default" data-dismiss="modal">Hủy bỏ</button>
            <button type="button" ng-click="$close('yes');" class="btn btn-primary" data-dismiss="modal">Lưu</button>
        </div>
    </div>
</script>

<script type="text/ng-template" id="confirm_delete_modal.html">

            <h4 class="modal-title"><i class="icon-question"></i>Xóa</h4>
        </div>
        <div class="modal-body">
            <p>Bạn có chắc chắn muốn xóa bản ghi đã chọn không?</p>

        </div>

<script type="text/ng-template" id="import_modal.html">
    <div modal-movable>
        <div class="modal-header">
            <button type="button" class="close" ng-click="$dismiss()" aria-hidden="true"></button>
            <h4 class="modal-title bold font-yellow-gold"><i class="fa fa-cloud-upload"></i> Thêm môn học vào chương trình đào tạo</h4>
        </div>
        <div class="modal-body">
            <div class="box-body box-profile">
                <div class="box-body">
                    <div class="row">
                        <div class="col-md-12">
                            <a class="dash-box display-block link" ngf-select="uploadFiles($file, $invalidFiles)"
                               accept="/*" ngf-max-size="{{MAX_FILE_SIZE}}"><i class="fa fa-cloud-upload"></i> Chọn tệp tin để tải lên</a>
                        </div>

                        <div class="col-md-12 margin-top-20" ng-if="f != null">
                            Tải tệp tin: {{f.name}}
                        </div>

                        <div class="col-md-12 margin-top-20" ng-if="errFile != null && errFile.$error != ''">
                            Có lỗi: <span ng-if="errFile.$error == 'maxSize'">Kích thước tệp tin phải nhỏ hơn {{errFile.$errorParam}}</span>
                            <span ng-if="errFile.$error != null && errFile.$error != 'maxSize'">Tệp tin {{errFile.name}} có lỗi. Xin mời chọn tệp tin khác.</span>
                        </div>

                        <div class="col-md-12 margin-top-20" ng-if="f.progress >= 0">
                            <div class="progress">
                                <div class="progress-bar" role="progressbar" aria-valuenow="70" aria-valuemin="0" aria-valuemax="100" ng-bind="f.progress + '%'" style="width:{{f.progress}}%">
                                    {{f.progress}}%
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" ng-click="$dismiss()" class="btn btn-default" data-dismiss="modal">Hủy</button>
            <button type="button" ng-click="$close('yes')" class="btn btn-primary" data-dismiss="modal">Tải lên</button>
        </div>
    </div>
</script>
