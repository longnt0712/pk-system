<script type="text/ng-template" id="edit_object_modal.html">
    <div modal-movable>
        <div class="modal-header">
            <button type="button" class="close" ng-click="$dismiss()" aria-hidden="true"></button>
            <h4 class="modal-title" data-ng-if="vm.question.isNew == true"><i class="icon-plus"></i>Thêm tôn giáo</h4>
            <h4 class="modal-title" data-ng-if="vm.question.isNew == false"><i class="fa fa-pencil-square-o"></i>Cập nhật tôn giáo</h4>
        </div>
        <div class="modal-body">
            <div class="row">
                <div class="col-md-12 margin-bottom-10 bold">Types of Question</label>
                    <ui-select ng-change="vm.selectType()" data-ng-model="vm.question.questionType" sortable="true" close-on-select="true" style="width: 100% !important;">
                        <ui-select-match allow-clear="true" placeholder="">{{$select.selected.name}}</ui-select-match>
                        <ui-select-choices repeat="questionType in vm.questionTypes | propsFilter: {name: $select.search}">
                            <div class="bold" ng-bind-html="questionType.name | highlight: $select.search"></div>
                        </ui-select-choices>
                    </ui-select>
                </div>
                <div class="col-md-12" style="margin-bottom: 10px">
                    <label class="bold">Word</label>
                    <textarea rows="4" class="form-control" ng-model="vm.question.question" autofocus />
                </div>
                <div class="col-md-12" style="margin-bottom: 10px">
                    <label class="bold">Description</label>
                    <textarea rows="4" class="form-control" ng-model="vm.question.description" autofocus />
                </div>
                <div class="col-md-6">
                    <div class="input-group" style="margin-bottom: 5px">
                        <input type="text" data-ng-model="vm.textSearch" class="form-control" placeholder="Tìm theo tên hoặc mã nhân sự" name="search"
                               ng-keypress="vm.enterSearchCode()">
                        <div class="input-group-btn">
                            <button ng-click="vm.searchByCode()" class="btn btn-default" type="submit">
                                <i class="glyphicon glyphicon-search"></i>
                            </button>
                        </div>
                    </div>
                    <table class="table table-striped table-bordered">
                        <thead>
                        <tr>
                            <th>List Answer</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr ng-repeat="item in vm.answers">
                            <td ng-bind-html="item.answer" class="b"></td>
                            <td><p><a ng-click="vm.addAnswer(item)"><i class="fa fa-plus"></i></a></p></td>
                        </tr>
                        </tbody>
                    </table>
                    <div class="col-md-12 text-center">
                        <ul uib-pagination items-per-page="vm.pageSizeAnswer" total-items="vm.totalItems" ng-model="vm.pageIndexAnswer" ng-change="pageChanged()" class="pagination-sm" boundary-links="true"></ul>
                    </div>
                </div>
                <div class="col-md-6" style="margin-top: 40px">
                    <table class="table table-striped table-bordered">
                        <thead>
                        <tr>
                            <th>Answer</th>
                            <th>Correct</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr ng-repeat="item in vm.question.questionAnswers">
                            <td ng-bind-html="item.answer.answer"></td>
                            <td>
                                <p><input type="checkbox" ng-model="item.correct"></p>
                            </td>
                            <td><p><a ng-click="vm.deleteAnswer($index)"><i class="fa fa-trash"></i></a></p></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" ng-click="$dismiss()" class="btn btn-default" data-dismiss="modal">Hủy bỏ</button>
            <button type="button" ng-click="$close('yes');" class="btn btn-primary" data-dismiss="modal">Lưu</button>
        </div>
    </div>
</script>
