<!-- END PAGE HEADER-->
<!-- BEGIN MAIN CONTENT -->
<div class="row margin-top-10" style="padding-left: 50px;padding-right: 50px">
    <div class="row">
        <div class="col-md-12" style="background-color: #daecf7">
            <div class="portlet bg-white bordered" style="width: 100%">
                <div class="portlet-body">

                    <div class="row">
                        <div class="col-md-12">
                            <div class="col-md-4 text-left">
                                <h4 style="padding-top: 10px" class="bold"><i class="fa fa-desktop"> </i>     &nbsp; &nbsp; XXXX XXXXX - 1234567</h4>
                                <!--<div data-ng-click="startCount()" class="btn btn-danger" >{{counter}}</div>-->
                            </div>
                            <div class="col-md-4  text-center" style="padding-bottom: 10px">
                                <h4 style="font-weight:bold;font-size:18px;padding-top: 10px" data-ng-click="startCount()" ><i class="fa fa-clock-o"></i> &nbsp; {{minuteDisplay}} : {{secondDisplay}}</h4>
                                <!--<h4 data-ng-click="startCount()" >{{minuteDisplay + 1}} minutes left</h4>-->
                                <!--<div data-ng-click="startCount()" class="btn btn-danger" >{{counter}}</div>-->
                            </div>
                            <div class="col-md-4 text-right" style="padding-top: 5px;padding-bottom: 5px">
                                <button style="padding-left: 20px; padding-right: 20px" ng-if="vm.isNewWriting == true" class="btn btn-primary" data-ng-click="vm.saveIELTSWritingActualTest()"> <span style="font-size: 18px" class="bold">Submit</span></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-12" style="">

                <div class="portlet bg-white bordered" style="margin-top: 10px;" >
                    <div class="portlet-body">
                        <div class="row">
                            <div class="col-md-12 margin-bottom-10 "style="margin-left: 20px;" >
                                <h3 ng-show="vm.task == 1" class="bold">Academic Writing Task 1</h3>
                                <h4 ng-show="vm.task == 1">You should spend about 20 minutes on this task. Write at least 150 words.</h4>

                                <h3 ng-show="vm.task == 2" class="bold">Academic Writing Task 2</h3>
                                <h4 ng-show="vm.task == 2">You should spend about 40 minutes on this task. Write at least 250 words.</h4>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="portlet bg-white bordered" style="margin-top: 10px">
                    <div class="portlet-body">
                        <div ng-show="vm.task == 1" class="row" style="margin-left: 5px;" >

                            <div class="col-md-6 margin-bottom-10" style="padding-top: 10px;">
                                <textarea ui-tinymce="tinymceOptionsToActualTestQuestion" id="tiny-question" ng-model="vm.writingTask1.question" />
                            </div>

                            <div  class="col-md-6 margin-bottom-10" style="padding-left: 150px;padding-right: 150px;padding-top: 10px; " >
                                <textarea style="border: solid 1px black" id="tiny-answer" ui-tinymce="tinymceOptionsToActualTestAnswer" data-ng-change="vm.onTextChangeActualTestTask1()"  ng-model="vm.writingTask1.description" />
                                <p style="font-size:15px;font-weight: bold;margin-top: 10px;">Word count: {{vm.writingTask1.countWords}}</p>
                            </div>
                        </div>

                        <div ng-show="vm.task == 2" class="row" style="margin-left: 5px;" >

                            <div class="col-md-6 margin-bottom-10" style="padding-top: 10px;">
                                <textarea ui-tinymce="tinymceOptionsToActualTestQuestion" id="tiny-question" ng-model="vm.writingTask2.question" />
                            </div>

                            <div  class="col-md-6 margin-bottom-10" style="padding-left: 150px;padding-right: 150px;padding-top: 10px; " >
                                <textarea style="border: solid 1px black" id="tiny-answer" ui-tinymce="tinymceOptionsToActualTestAnswer" data-ng-change="vm.onTextChangeActualTestTask2()"  ng-model="vm.writingTask2.description" />
                                <p style="font-size:15px;font-weight: bold;margin-top: 10px;">Word count: {{vm.writingTask2.countWords}}</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-1" style="padding-top: 25px;padding-left: 20px">
                        <input class="" type="checkbox"  id="defaultCheck1">
                        <label style="font-size: 18px" class="form-check-label bold" for="defaultCheck1">
                            &nbsp; Review
                        </label>
                    </div>

                    <div class="col-md-10" style="padding-top: 10px">
                        <div class="portlet bg-white bordered" style="padding-top: 10px;padding-bottom: 10px">
                            <div class="portlet-body">
                                <label class="form-check-label bold" for="button-part-1" style="margin-left: 20px;font-size: 18px">
                                    Part 1: &nbsp; &nbsp;
                                </label>
                                <button data-ng-click="vm.changeTask1IELTSWriting()" ng-show="vm.task == 2" style="border-radius: 7px;padding-left: 13px;padding-right: 13px;" class="btn btn-default"  id="button-part-1"> <span style="font-size: 18px;font-weight: bold"> 1</span></button>
                                <button ng-show="vm.task == 1" style="border-radius: 7px;padding-left: 13px;padding-right: 13px;" class="btn btn-primary"  id="button-part-1"> <span style="font-size: 18px;font-weight: bold"> 1</span></button>


                                <label class="form-check-label bold"  for="button-part-2" style="margin-left: 30px;font-size: 18px;">
                                    Part 2: &nbsp; &nbsp;
                                </label>
                                <button data-ng-click="vm.changeTask2IELTSWriting()" ng-show="vm.task == 1" style="border-radius: 7px;padding-left: 12px;padding-right: 12px;" class="btn btn-default"  id="button-part-2"> <span style="font-size: 18px;font-weight: bold"> 2</span></button>
                                <button ng-show="vm.task == 2" style="border-radius: 7px;padding-left: 12px;padding-right: 12px;" class="btn btn-primary"  id="button-part-2"> <span style="font-size: 18px;font-weight: bold"> 2</span></button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-1 text-right" style="margin-top:10px;margin-bottom: 10px">
                        <button style="border-radius: 30px;padding: 20px 20px 20px 20px;" data-ng-click="vm.changeTask1IELTSWriting()" class="btn btn-default" class="form-control"> <i class="fa fa-arrow-left"></i></button>
                        <button style="border-radius: 30px;padding: 20px 20px 20px 20px;" data-ng-click="vm.changeTask2IELTSWriting()" class="btn btn-default" class="form-control"> <i class="fa fa-arrow-right"></i></button>
                    </div>

                </div>
            </div>
        </div>
    </div>




</div>


<script type="text/ng-template" id="result_modal.html">
    <div modal-movable>
        <div class="modal-header">
            <button type="button" class="close" ng-click="$dismiss()" aria-hidden="true"></button>
            <h4 class="modal-title"><i class="fa fa-check"></i>Đáp án</h4>
        </div>
        <div class="modal-body">

        </div>
        <div class="modal-footer">
            <button type="button" ng-click="$dismiss()" class="btn btn-default" data-dismiss="modal">Không</button>
            <button type="button" ng-click="$close('yes')" class="btn btn-primary" data-dismiss="modal">Có</button>
        </div>
    </div>
</script>

    .dx-htmleditor-content img {
        vertical-align: middle;
        padding-right: 10px;
    }

    .dx-htmleditor-content table {
        width: 50%;
    }

    .options {
        padding: 20px;
        background-color: rgba(191, 191, 191, 0.15);
        margin-top: 20px;
    }

    .caption {
        font-size: 18px;
        font-weight: 500;
    }

    .option {
        margin-top: 10px;
    }

</style>
