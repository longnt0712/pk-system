<!-- BEGIN MAIN CONTENT -->
<div class="row margin-top-10">
    <div class="col-md-7">
    
        <div class="portlet bg-gray-light bordered">
            <div class="portlet-body">
                <div class="row">
                    <div class="col-md-8 margin-bottom-10">
                        <input data-ng-model="vm.ieltsWritingTest.title" type="text" class="form-control" placeholder="Test Name..." />
                    </div>
                    <div class="col-md-4 margin-bottom-20 text-right" style="padding-right: 5px">
                        <button ng-if="vm.isCreateNewIELTSWritingTest == true" class="btn btn-primary" data-ng-click="vm.saveCreateIELTSWriting()"><i class="fa fa-save"></i>   Add new</button>
                        <button ng-if="vm.isCreateNewIELTSWritingTest == false" class="btn btn-primary" data-ng-click="vm.saveCreateIELTSWriting();"><i class="fa fa-pencil"></i>   Edit Text</button>
                        <button ng-if="vm.isCreateNewIELTSWritingTest == false" class="btn btn-default" data-ng-click="vm.cancelEditingCreateIELTSWritingTest()"><i class="fa fa-times"></i>   Cancel Edit</button>
                    </div>

                    <div class="col-md-12 margin-bottom-10" >
                        <label class="bold">Task 1</label>
                        <textarea ui-tinymce="tinymceOptionsToCreateTestTask1" id="tiny-question" ng-model="vm.writingTask1.question" />
                    </div>
                </div>

                <div class="row">
                    <div  class="col-md-12 margin-bottom-10" >
                        <label class="bold">Task 2</label>
                        <textarea id="tiny-answer" ui-tinymce="tinymceOptionsToCreateTestTask2" ng-model="vm.writingTask2.question" />
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-5" >

        <div class="portlet light bordered">
            <div class="portlet-body">

                <div class="row">
                    <div class="col-md-4 margin-bottom-20">
                        <div class="input-group">
                            <input ng-model="vm.searchDto.textSearch" ng-keyup="vm.enterSearchCode(e)" type="text"  class="form-control" placeholder="Find test...">
                            <div class="input-group-btn">
                                <button ng-click="vm.codeChange()" class="btn btn-default" type="submit"><i class="glyphicon glyphicon-search"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12">
                        <table id="bsTableControl" bs-table-control="vm.bsTableControlCreateIELTSWritingTest"></table>
                    </div>
                </div>


            </div>
        </div>
    </div>
</div>


<script type="text/ng-template" id="result_modal.html">
    <div modal-movable>
        <div class="modal-header">
            <button type="button" class="close" ng-click="$dismiss()" aria-hidden="true"></button>
            <h4 class="modal-title"><i class="fa fa-check"></i>Đáp án</h4>
        </div>
        <div class="modal-body">

        </div>
        <div class="modal-footer">
            <button type="button" ng-click="$dismiss()" class="btn btn-default" data-dismiss="modal">Không</button>
            <button type="button" ng-click="$close('yes')" class="btn btn-primary" data-dismiss="modal">Có</button>
        </div>
    </div>
</script>
